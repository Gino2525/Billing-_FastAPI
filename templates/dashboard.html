<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing POS | Dashboard</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <h2 style="color: var(--primary);">Retail<span style="color: var(--text);">POS</span></h2>
        </div>
        <div class="user-meta">
            <span id="user-display" style="margin-right: 15px; color: var(--secondary);">Admin</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="inventory-section">
            <div class="search-group">
                <input type="text" id="search" placeholder="Search by name or barcode..." onkeyup="handleSearch(event)">
                <button class="primary-btn" onclick="searchProduct()">
                    🔍 Search
                </button>
            </div>
            
            <ul id="results" class="product-list">
                </ul>
        </section>

        <section class="cart-section">
            <h3>Current Order</h3>
            <div class="cart-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>Total (Inc. GST)</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cart"></tbody>
                </table>
            </div>

            <div class="cart-footer">
                <div class="total-row">
                    <span>Grand Total:</span>
                    <span>₹ <span id="total">0.00</span></span>
                </div>
                <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
            </div>
        </section>
    </main>

    <script src="/static/js/api.js"></script>
    <script>
        // 🔹 1. Global State
        let allProducts = []; // Stores the full inventory for instant searching
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        // Check Auth
        if (!localStorage.getItem("access_token")) window.location.href = "/";

        // 🔹 2. INITIALIZATION: Fetch everything on load
        async function initDashboard() {
            try {
                const res = await apiRequest("/products");
                if (!res.ok) throw new Error("Failed to load inventory");
                
                allProducts = await res.json();
                
                // Show all items immediately
                displayProducts(allProducts);
                renderCart();
            } catch (err) {
                console.error(err);
                document.getElementById("results").innerHTML = `<p style="padding:20px; color:red;">Error loading products.</p>`;
            }
        }

        // 🔹 3. DISPLAY LOGIC
        function displayProducts(products) {
            const listUI = document.getElementById("results");
            listUI.innerHTML = "";

            if (products.length === 0) {
                listUI.innerHTML = `<p style="padding:20px; color:gray;">No products found.</p>`;
                return;
            }

            products.forEach(p => {
                listUI.innerHTML += `
                <li class="product-item">
                    <div>
                        <strong>${p.name}</strong><br>
                        <small style="color: var(--secondary)">Stock: ${p.stock} | Price: ₹${p.price}</small>
                    </div>
                    <div style="display:flex; gap: 8px;">
                        <input type="number" step="0.001" id="qty-${p.id}" value="1" min="0.001" max="${p.stock}" style="width:50px; padding: 5px;">
                        <button class="primary-btn" onclick="addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price}, ${p.gst}, ${p.stock})">✚ Add</button>
                    </div>
                </li>`;
            });
        }

        // 🔹 4. SEARCH LOGIC (Local filtering for speed)
        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(query) || 
                (p.barcode && p.barcode.includes(query))
            );
            displayProducts(filtered);
        }

        function searchProduct() {
            const query = document.getElementById("search").value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            displayProducts(filtered);
        }

        // 🔹 5. CART LOGIC
        function addToCart(id, name, price, gst, stock, qtyOverride = null) {
        let qty = qtyOverride !== null 
            ? qtyOverride 
            : parseFloat(document.getElementById(`qty-${id}`)?.value || 1);

        if (!qty || qty <= 0) return alert("Enter valid quantity");
        if (qty > stock) return alert("Insufficient stock");

        let existing = cart.find(p => p.id === id);

        if (existing) {
            if (existing.quantity + qty > stock) return alert("Total exceeds stock");
            existing.quantity += qty;
        } else {
            cart.push({ id, name, price, gst, quantity: qty });
        }

        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
    }

        function renderCart() {
            let cartUI = document.getElementById("cart");
            cartUI.innerHTML = "";
            let grandTotal = 0;

            cart.forEach((p, index) => {
                let basePrice = p.price * p.quantity;
                let gstAmt = basePrice * (p.gst / 100);
                let finalItemTotal = basePrice + gstAmt;
                grandTotal += finalItemTotal;

                cartUI.innerHTML += `
                <tr>
                    <td><b>${p.name}</b><br><small>₹${p.price} + ${p.gst}% GST</small></td>
                    <td>${p.quantity}</td>
                    <td>₹${finalItemTotal.toFixed(2)}</td>
                    <td><button class="remove-btn" onclick="removeItem(${index})">✕</button></td>
                </tr>`;
            });

            document.getElementById("total").innerText = grandTotal.toLocaleString('en-IN', {minimumFractionDigits: 2});
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        // 🔹 6. CHECKOUT LOGIC
        async function checkout() {
            if (cart.length === 0) return alert("Cart is empty");
            
            const btn = document.querySelector('.checkout-btn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const items = cart.map(p => ({ product_id: p.id, quantity: p.quantity }));
                const res = await apiRequest("/billing/create-bill", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ items })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || "Checkout Failed");

                localStorage.removeItem("cart");
                cart = [];
                window.location.href = `/invoice/${data.bill_id}`;
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "/";
        }

        // 🔥 RUN ON LOAD
        initDashboard();

        let scanBuffer = "";
        let lastScanTime = Date.now();

        document.addEventListener("keydown", function (e) {
            const now = Date.now();

            // Reset buffer if delay (human typing)
            if (now - lastScanTime > 100) {
                scanBuffer = "";
            }

            lastScanTime = now;

            if (e.key === "Enter") {
                if (scanBuffer.length > 3) {
                    handleScan(scanBuffer);
                }
                scanBuffer = "";
                return;
            }

            scanBuffer += e.key;
        });


        function handleScan(code) {
            console.log("Scanned:", code);

            const product = allProducts.find(p => p.barcode === code);

            if (!product) {
                alert("Product not found");
                return;
            }

            // Auto add 1 quantity
            addToCart(product.id, product.name, product.price, product.gst, product.stock, 1);

        }
    </script>
</body>
</html>
